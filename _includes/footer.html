<!-- Footer -->
<footer class="site-footer">
    <div class="footer-inner">
        <div class="footer-social">
            {% if site.weibo_username %}
            <a target="_blank" href="https://weibo.com/{{ site.weibo_username }}" title="微博">
                <i class="fa fa-weibo"></i>
            </a>
            {% endif %}
            {% if site.github_username %}
            <a target="_blank" href="https://github.com/{{ site.github_username }}" title="GitHub">
                <i class="fa fa-github"></i>
            </a>
            {% endif %}
            {% if site.email %}
            <a href="mailto:{{ site.email }}" title="Email">
                <i class="fa fa-envelope"></i>
            </a>
            {% endif %}
        </div>
        <p class="footer-copyright">
            &copy; {{ site.time | date: '%Y' }} {{ site.author }} &middot; Powered by Jekyll
        </p>
    </div>
</footer>

<!-- Scroll to Top -->
<button class="scroll-top" id="scroll-top" aria-label="Scroll to top">
    <i class="fa fa-chevron-up"></i>
</button>

<!-- jQuery -->
<script src="{{ site.baseurl }}/js/jquery.min.js"></script>

<!-- Scroll to Top Script -->
<script>
(function() {
    var btn = document.getElementById('scroll-top');
    window.addEventListener('scroll', function() {
        if (window.scrollY > 400) {
            btn.classList.add('visible');
        } else {
            btn.classList.remove('visible');
        }
    });
    btn.addEventListener('click', function() {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });
})();
</script>

{% if site.service-worker %}
<script>
    if(navigator.serviceWorker){
        navigator.serviceWorker
            .register('/sw.js')
            .then(function(registration) { console.log('SW Registered.', registration); })
            .catch(function(error) { console.log('SW registration failed:', error); });
    }
</script>
{% endif %}
