<!-- Progress Bar -->
<div id="progress-bar"></div>

<!-- Navigation -->
<nav class="site-nav" id="site-nav">
    <div class="nav-inner">
        <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <ul class="nav-links" id="nav-links">
            {% if page.lang == 'en' %}
            <li><a href="{{ site.baseurl }}/index-en/">Home</a></li>
            <li><a href="{{ site.baseurl }}/publication-en/">Research</a></li>
            <li><a href="{{ site.baseurl }}/blog-en/">Blog</a></li>
            {% else %}
            <li><a href="{{ site.baseurl }}/">首页</a></li>
            <li><a href="{{ site.baseurl }}/publication/">研究</a></li>
            <li><a href="{{ site.baseurl }}/blog/">博客</a></li>
            {% endif %}
        </ul>
        <div class="nav-actions">
            {% if page.lang == 'en' %}
            <a class="nav-action-btn nav-lang-btn" href="{{ site.baseurl }}{{ page.lang_url }}" aria-label="切换为中文">中文</a>
            {% else %}
            <a class="nav-action-btn nav-lang-btn" href="{{ site.baseurl }}{{ page.lang_url }}" aria-label="Switch to English">EN</a>
            {% endif %}
            <button class="nav-action-btn" id="theme-toggle" aria-label="切换主题">
                <i class="fa-solid fa-sun" id="theme-icon"></i>
            </button>
            <button class="nav-action-btn" id="search-btn" aria-label="搜索">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </div>
    </div>
</nav>

<script>
(function() {
    var nav = document.getElementById('site-nav');
    var toggle = document.getElementById('nav-toggle');
    var links = document.getElementById('nav-links');

    // Progress bar
    function onScroll() {
        var winScroll = document.body.scrollTop || document.documentElement.scrollTop;
        var height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        var scrolled = height > 0 ? (winScroll / height) * 100 : 0;
        var bar = document.getElementById('progress-bar');
        if (bar) bar.style.width = scrolled + '%';
    }

    window.addEventListener('scroll', onScroll);
    onScroll();

    // Mobile toggle
    toggle.addEventListener('click', function() {
        links.classList.toggle('open');
    });

    // Close mobile menu on link click
    var navLinks = links.querySelectorAll('a');
    for (var i = 0; i < navLinks.length; i++) {
        navLinks[i].addEventListener('click', function() {
            links.classList.remove('open');
        });
    }

    // Close on outside click
    document.addEventListener('click', function(e) {
        if (!nav.contains(e.target)) {
            links.classList.remove('open');
        }
    });
})();
</script>
