<!-- Progress Bar -->
<div id="progress-bar"></div>

<!-- Navigation -->
<nav class="site-nav transparent" id="site-nav">
    <div class="nav-inner">
        <a class="nav-brand" id="nav-brand" href="{{ site.baseurl }}/">{{ site.author }}</a>
        <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <ul class="nav-links" id="nav-links">
            <li><a href="{{ site.baseurl }}/" id="nav-home">首页</a></li>
            <li><a href="{{ site.baseurl }}/about/" id="nav-about">简历</a></li>
            <li><a href="{{ site.baseurl }}/publication/" id="nav-research">研究</a></li>
        </ul>
        <div class="nav-actions">
            <button class="nav-action-btn" id="lang-toggle" aria-label="Switch language" style="font-size: 0.7rem; font-weight: 700; letter-spacing: 0.05em;">EN</button>
            <button class="nav-action-btn" id="theme-toggle" aria-label="切换主题">
                <i class="fa-solid fa-moon" id="theme-icon"></i>
            </button>
            <button class="nav-action-btn" id="search-btn" aria-label="搜索">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </div>
    </div>
</nav>

<script>
(function() {
    var nav = document.getElementById('site-nav');
    var toggle = document.getElementById('nav-toggle');
    var links = document.getElementById('nav-links');

    // Scroll effect
    function onScroll() {
        if (window.scrollY > 50) {
            nav.classList.remove('transparent');
            nav.classList.add('scrolled');
        } else {
            nav.classList.remove('scrolled');
            nav.classList.add('transparent');
        }

        // Progress bar
        var winScroll = document.body.scrollTop || document.documentElement.scrollTop;
        var height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        var scrolled = height > 0 ? (winScroll / height) * 100 : 0;
        var bar = document.getElementById('progress-bar');
        if (bar) bar.style.width = scrolled + '%';
    }

    window.addEventListener('scroll', onScroll);
    onScroll();

    // Mobile toggle
    toggle.addEventListener('click', function() {
        links.classList.toggle('open');
    });

    // Close mobile menu on link click
    var navLinks = links.querySelectorAll('a');
    for (var i = 0; i < navLinks.length; i++) {
        navLinks[i].addEventListener('click', function() {
            links.classList.remove('open');
        });
    }

    // Close on outside click
    document.addEventListener('click', function(e) {
        if (!nav.contains(e.target)) {
            links.classList.remove('open');
        }
    });

    // Language switching
    var path = window.location.pathname;

    var pagePairs = {
        '/about/':          '/about-en/',
        '/about-en/':       '/about/',
        '/publication/':    '/publication-en/',
        '/publication-en/': '/publication/'
    };

    var labels = {
        cn: { home: '首页', about: '简历', research: '研究', brand: '孙喜斌' },
        en: { home: 'Home', about: 'CV',   research: 'Research', brand: 'Xibin Sun' }
    };

    // Derive current language from URL; fall back to stored preference
    function detectLang() {
        if (path.indexOf('/about-en') !== -1 || path.indexOf('/publication-en') !== -1) return 'en';
        return localStorage.getItem('lang') || 'cn';
    }

    function applyLang(lang) {
        var l = labels[lang];
        var homeEl     = document.getElementById('nav-home');
        var aboutEl    = document.getElementById('nav-about');
        var researchEl = document.getElementById('nav-research');
        var brandEl    = document.getElementById('nav-brand');
        var toggleEl   = document.getElementById('lang-toggle');

        if (homeEl)     homeEl.textContent     = l.home;
        if (brandEl)    brandEl.textContent    = l.brand;
        if (aboutEl)  { aboutEl.textContent    = l.about;    aboutEl.href    = lang === 'en' ? '/about-en/'       : '/about/'; }
        if (researchEl){ researchEl.textContent = l.research; researchEl.href = lang === 'en' ? '/publication-en/' : '/publication/'; }
        if (toggleEl)   toggleEl.textContent   = lang === 'en' ? '中文' : 'EN';
    }

    var currentLang = detectLang();
    applyLang(currentLang);

    document.getElementById('lang-toggle').addEventListener('click', function() {
        var lang    = localStorage.getItem('lang') || 'cn';
        var newLang = lang === 'cn' ? 'en' : 'cn';
        localStorage.setItem('lang', newLang);

        if (pagePairs[path]) {
            window.location.href = pagePairs[path];
        } else {
            applyLang(newLang);
            document.dispatchEvent(new CustomEvent('langChange', { detail: { lang: newLang } }));
        }
    });
})();
</script>
